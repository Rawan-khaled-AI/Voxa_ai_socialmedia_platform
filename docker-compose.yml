version: "3.9"

services:
  db:
    image: postgres:16
    container_name: voxa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: voxa-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      - db

volumes:
  postgres_data: