name: voxa_app
description: "VOXA - Voice-Based Social Media Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.3.10
  http: ^1.2.0
  shared_preferences: ^2.2.3
  image_picker: ^1.0.7
  record: ^6.2.0
  path_provider: ^2.1.5
  just_audio: ^0.9.39
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/voxa_logo_color.png
    - assets/voxa_logo_white.png
    - assets/demo_pyramids.jpg
    - assets/avatar_1.jpg

flutter_native_splash:
  color: "#E8DBFF"
  android: true
  ios: false

  android_12:
    color: "#E8DBFF"

